<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAX - Voice Assistant Dashboard</title>
  <!-- Google Fonts: Inter and Share Tech Mono (for stats/cyberspace look) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="index.css">
</head>
<body class="state-sleeping">

  <!-- ==================== WAKE TRIGGER DISPLAY (FULL SCREEN FACE) ==================== -->
  <div id="face-container" class="face-container">
    <!-- Ambient glowing backgrounds -->
    <div class="ambient-glow"></div>
    
    <div class="robot-helmet">
      <!-- Side Ears/LEDs -->
      <div class="helmet-ear left-ear"></div>
      <div class="helmet-ear right-ear"></div>
      
      <!-- Visor Area -->
      <div class="helmet-visor">
        <!-- Visor Grid / Scanline overlay -->
        <div class="visor-grid"></div>
        <div class="scanline"></div>
        
        <!-- Interactive Eyes -->
        <div class="face-eyes">
          <div class="eye left-eye">
            <!-- Normal Eye Circle -->
            <div class="eye-shape normal-eye"></div>
            <!-- X Eye for Error -->
            <div class="eye-shape x-eye">
              <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
            </div>
            <!-- Sleep Eye -->
            <div class="eye-shape sleep-eye"></div>
            <!-- Wink/Curve Eye -->
            <div class="eye-shape arc-eye">
              <svg viewBox="0 0 24 24" fill="none"><path d="M4 14c2-4 6-6 8-6s6 2 8 6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
            </div>
            <!-- Spinner for processing -->
            <div class="eye-shape spinner-eye">
              <div class="spinner"></div>
            </div>
            <!-- Question mark for confused -->
            <div class="eye-shape question-eye">?</div>
          </div>
          
          <div class="eye right-eye">
            <!-- Normal Eye Circle -->
            <div class="eye-shape normal-eye"></div>
            <!-- X Eye for Error -->
            <div class="eye-shape x-eye">
              <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
            </div>
            <!-- Sleep Eye -->
            <div class="eye-shape sleep-eye"></div>
            <!-- Wink/Curve Eye -->
            <div class="eye-shape arc-eye">
              <svg viewBox="0 0 24 24" fill="none"><path d="M4 14c2-4 6-6 8-6s6 2 8 6" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
            </div>
            <!-- Spinner for processing -->
            <div class="eye-shape spinner-eye">
              <div class="spinner"></div>
            </div>
            <!-- Question mark for confused -->
            <div class="eye-shape question-eye">?</div>
          </div>
        </div>
        
        <!-- Interactive Mouth / Speechwave -->
        <div class="face-mouth">
          <!-- Static smiling path -->
          <svg class="mouth-smile" viewBox="0 0 100 30" fill="none">
            <path d="M20 5c15 15 45 15 60 0" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <!-- Static flat/neutral path -->
          <svg class="mouth-neutral" viewBox="0 0 100 20" fill="none">
            <line x1="20" y1="10" x2="80" y2="10" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <!-- Static sad path -->
          <svg class="mouth-sad" viewBox="0 0 100 30" fill="none">
            <path d="M20 25c15-15 45-15 60 0" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <!-- Dynamic speaking equalizer bars -->
          <div class="mouth-equalizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Visual Indicator under Face -->
    <div class="face-status-text" id="face-status-text">SAY "START" OR "MAX" TO BEGIN</div>
    <div class="face-listening-waves" id="face-listening-waves">
      <div class="face-wave-bar"></div>
      <div class="face-wave-bar"></div>
      <div class="face-wave-bar"></div>
      <div class="face-wave-bar"></div>
      <div class="face-wave-bar"></div>
    </div>
  </div>

  <!-- ==================== HIDDEN DASHBOARD TRIGGER ZONE ==================== -->
  <div id="hidden-dashboard-trigger" class="hidden-dashboard-trigger" title="Enter Dashboard">
    <i data-lucide="settings"></i>
  </div>

  <!-- ==================== THE DASHBOARD PANEL OVERLAY ==================== -->
  <div id="dashboard-container" class="dashboard-container hidden">
    <div class="dashboard-card">
      <!-- Header -->
      <div class="db-header">
        <div class="header-left">
          <button class="smiley-back-btn" id="db-back-btn" title="Back to Face Screen">
            <div class="mini-smiley">
              <div class="mini-eye"></div>
              <div class="mini-eye"></div>
              <div class="mini-mouth"></div>
            </div>
          </button>
          <div class="chip-icon-wrapper">
            <i data-lucide="cpu" class="chip-icon"></i>
          </div>
          <div class="title-meta">
            <span class="meta-title">MAX</span>
            <span class="meta-subtitle">HYBRID AI ASSISTANT</span>
          </div>
        </div>
        
        <div class="header-right">
          <div class="badge status-badge">
            <span class="status-dot"></span>
            Online Mode
          </div>
          <div class="badge latency-badge">
            <i data-lucide="clock" class="badge-icon"></i>
            <span id="latency-val">--- ms</span>
          </div>
          <button class="settings-btn" id="settings-toggle" title="Settings Panel">
            <i data-lucide="sliders-horizontal"></i>
          </button>
        </div>
      </div>

      <!-- Main Chat Area -->
      <div class="db-chat-body" id="chat-messages">
        <div class="chat-message bot-msg">
          <div class="msg-avatar">
            <i data-lucide="bot"></i>
          </div>
          <div class="msg-bubble">
            Ready to assist. Say "Start" or "Max" to activate voice control, or use the panel controls below.
          </div>
        </div>
      </div>

      <!-- Live Waveform & Instruction Bar -->
      <div class="db-wave-bar">
        <!-- SVG waves reflecting state -->
        <div class="wave-lines-container">
          <svg class="wave-svg" viewBox="0 0 1200 100" preserveAspectRatio="none">
            <path id="wave-path-1" class="wave-path wave-path-1" d="M0,50 Q150,50 300,50 T600,50 T900,50 T1200,50" fill="none" stroke="rgba(0, 229, 255, 0.4)" stroke-width="2"/>
            <path id="wave-path-2" class="wave-path wave-path-2" d="M0,50 Q150,50 300,50 T600,50 T900,50 T1200,50" fill="none" stroke="rgba(0, 229, 255, 0.2)" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="status-instruction" id="db-status-instruction">SAY 'START' OR 'MAX' TO BEGIN</div>
      </div>

      <!-- Bottom Control Panels -->
      <div class="db-controls-container">
        <!-- Options Row -->
        <div class="controls-row">
          <div class="btn-group" id="mode-group">
            <button class="control-btn" data-mode="auto">Auto Select</button>
            <button class="control-btn active" data-mode="online">Force Online</button>
            <button class="control-btn" data-mode="offline">Force Offline</button>
          </div>
          
          <div class="btn-group" id="lang-group">
            <button class="control-btn active" data-lang="auto">Auto Language</button>
            <button class="control-btn" data-lang="en">English</button>
            <button class="control-btn" data-lang="ta">Tamil</button>
            <button class="control-btn" data-lang="hi">Hindi</button>
            <button class="control-btn" data-lang="te">Telugu</button>
            <button class="control-btn" data-lang="ml">Malayalam</button>
          </div>
        </div>

        <!-- Input Box Row -->
        <div class="input-row">
          <div class="text-input-wrapper">
            <input type="text" id="manual-text-input" placeholder="Ask Max something...">
            <button class="send-btn" id="manual-send-btn" title="Send text prompt">
              <i data-lucide="send-horizontal"></i>
            </button>
          </div>
          <button class="voice-toggle-btn" id="voice-trigger-btn" title="Toggle Voice Recognition">
            <div class="mic-icon-wrapper">
              <i data-lucide="mic" id="mic-icon"></i>
              <div class="pulse-ring"></div>
            </div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings overlay Modal -->
  <div id="settings-modal" class="settings-modal hidden">
    <div class="settings-content">
      <div class="settings-header">
        <h3>Settings & Configuration</h3>
        <button id="close-settings-btn" class="close-btn"><i data-lucide="x"></i></button>
      </div>
      <div class="settings-body">
        <div class="setting-item">
          <label for="settings-api-key">Gemini API Key</label>
          <input type="password" id="settings-api-key" placeholder="Enter Gemini API key...">
        </div>
        <div class="setting-item">
          <label for="settings-model">Model Selection</label>
          <select id="settings-model">
            <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite (Stable & Default)</option>
            <option value="gemini-3.5-flash">gemini-3.5-flash (High Demand Fallback)</option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
          </select>
        </div>
        <div class="setting-item">
          <label for="settings-voice-speed">TTS Voice Speed</label>
          <input type="range" id="settings-voice-speed" min="0.7" max="1.4" step="0.1" value="1.0">
          <span id="speed-val">1.0x</span>
        </div>
        <div class="setting-item">
          <label>Detected / Configured Language Status</label>
          <div id="lang-status" class="status-info">Auto (Ready)</div>
        </div>
        <button id="save-settings-btn" class="save-btn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
